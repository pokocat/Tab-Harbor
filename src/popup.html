<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="popup-document-title">TabHarbor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="hero">
        <div class="hero-brand">
          <p id="popup-brand" class="eyebrow">TabHarbor</p>
        </div>
        <p id="hero-quote" class="subtle"></p>
      </header>

      <section class="card compact-card">
        <div class="section-header">
          <h2 id="popup-quick-actions-title">Quick Actions</h2>
          <label id="popup-sound-switch" class="switch" aria-label="Toggle sound feedback">
            <input id="sound-enabled-toggle" type="checkbox" />
            <span class="switch-track">
              <span class="switch-thumb"></span>
            </span>
            <span id="popup-sound-label" class="switch-label">Sound</span>
          </label>
        </div>
        <div class="action-grid quick-action-grid">
          <button id="archive-window-button" class="primary action-accent">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" focusable="false">
                <path d="M3 4.5h10" />
                <path d="M4.5 6.5h7v5h-7z" />
                <path d="M6 8.5h4" />
              </svg>
            </span>
            <span id="popup-action-archive-label">Archive</span>
          </button>
          <button id="close-duplicates-button" class="action-warn">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" focusable="false">
                <path d="M5 5.5h6v6H5z" />
                <path d="M3.5 3.5h6v6" />
              </svg>
            </span>
            <span id="popup-action-dedup-label">Dedup</span>
          </button>
          <button id="open-dashboard-button" class="action-info">
            <span class="action-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" focusable="false">
                <path d="M3.5 4.5h9" />
                <path d="M3.5 8h9" />
                <path d="M3.5 11.5h9" />
              </svg>
            </span>
            <span id="popup-action-manage-label">Manage</span>
          </button>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2 id="popup-current-window-title">Current Window</h2>
          <span id="current-window-meta" class="section-meta">Grouped by root domain</span>
        </div>
        <div class="list-controls">
          <div class="toolbar-mini radio-toolbar">
            <span id="popup-group-label" class="toolbar-label">Group</span>
            <div class="radio-row" id="popup-group-select" role="radiogroup" aria-label="Group tabs in popup">
              <label class="radio-pill">
                <input type="radio" name="popup-group" value="domain" checked />
                <span id="popup-group-domain-label">Domain</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="popup-group" value="none" />
                <span id="popup-group-none-label">None</span>
              </label>
            </div>
          </div>
          <div class="toolbar-mini radio-toolbar">
            <span id="popup-sort-label" class="toolbar-label">Sort</span>
            <div class="radio-row" id="popup-sort-select" role="radiogroup" aria-label="Sort tabs in popup">
              <label class="radio-pill">
                <input type="radio" name="popup-sort" value="recent" checked />
                <span id="popup-sort-recent-label">Recent</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="popup-sort" value="title" />
                <span id="popup-sort-title-label">Title</span>
              </label>
            </div>
          </div>
        </div>
        <input
          id="current-window-search-input"
          class="search-input compact-search"
          type="search"
          name="current-window-search"
          aria-label="Search tabs in current window"
          autocomplete="off"
          placeholder="Filter tabs in this window…"
        />
        <div id="current-window-list" class="stack dense-list"></div>
      </section>

      <section class="summary-grid" id="summary-grid"></section>

      <section class="card compact-card">
        <div class="section-header">
          <h2 id="popup-duplicates-title">Duplicate Tabs</h2>
        </div>
        <div id="duplicate-clusters-list" class="stack dense-list"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2 id="popup-quick-search-title">Quick Search</h2>
        </div>
        <input
          id="quick-search-input"
          class="search-input"
          type="search"
          name="quick-search"
          aria-label="Search tabs and archived sessions"
          autocomplete="off"
          placeholder="Search tabs & sessions…"
        />
        <div id="quick-search-results" class="stack dense-list"></div>
      </section>

      <section class="card compact-card" id="suggestions-card">
        <div class="section-header">
          <h2 id="popup-suggestions-title">Suggestions</h2>
        </div>
        <div id="suggestions-list" class="stack"></div>
      </section>

      <section class="card compact-card">
        <div class="section-header">
          <h2 id="popup-sessions-title">Recent Sessions</h2>
        </div>
        <div id="sessions-list" class="stack dense-list"></div>
      </section>

      <footer class="popup-footer">
        <a id="popup-contact-link" class="footer-link" href="mailto:pokocat@163.com" target="_blank" rel="noreferrer">Contact Author</a>
        <a id="popup-issues-link" class="footer-link" href="https://github.com/pokocat/Tab-Harbor/issues" target="_blank" rel="noreferrer">GitHub Issues</a>
      </footer>
    </main>

    <template id="metric-template">
      <article class="metric">
        <span class="metric-label"></span>
        <strong class="metric-value"></strong>
        <button type="button" class="metric-link" hidden></button>
      </article>
    </template>

    <script type="module" src="popup.js"></script>
  </body>
  </html>
